<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>404 — Página no encontrada · Moisés Lagos F.</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  :root { --bg: #0A0A0B; --text: #FAFAFA; --muted: #A1A1AA; --brand: #3B82F6; --accent: #22D3EE; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: grid; place-items: center; padding: 24px; text-align: center;
  }
  .wrap { max-width: 520px; }
  .code {
    font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    font-size: clamp(80px, 18vw, 160px); font-weight: 800; letter-spacing: -6px;
    line-height: 0.9; background: linear-gradient(135deg, var(--brand), var(--accent));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; margin-bottom: 24px;
  }
  h1 { font-size: clamp(24px, 4vw, 32px); font-weight: 700; letter-spacing: -1px; margin-bottom: 12px; }
  p { color: var(--muted); font-size: 16px; line-height: 1.5; margin-bottom: 32px; }
  a {
    display: inline-block; background: var(--text); color: var(--bg);
    padding: 12px 24px; border-radius: 999px; text-decoration: none;
    font-weight: 600; font-size: 14px; transition: transform 0.2s;
  }
  a:hover { transform: translateY(-2px); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Esto no estaba en el plan</h1>
    <p>La página que buscas no existe o fue movida. Volvamos al inicio.</p>
    <a href="/">← Volver al CV</a>
  </div>
</body>
</html>
